<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mview Fidelity Viewer</title>
        <link rel="icon" href="data:," />
        <style>
            :root {
                color-scheme: dark;
                --bg: #7b7b7b;
                --panel: rgba(17, 21, 26, 0.7);
                --line: rgba(255, 255, 255, 0.14);
                --text: #eef2f6;
                --muted: #b9c2cc;
            }

            * { box-sizing: border-box; }

            html, body {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: var(--bg);
                color: var(--text);
                font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
            }

            #app, #viewer {
                width: 100%;
                height: 100%;
            }

            #viewer {
                display: block;
            }

            .hud,
            .status {
                position: fixed;
                z-index: 10;
                padding: 12px 14px;
                border: 1px solid var(--line);
                border-radius: 14px;
                background: var(--panel);
                backdrop-filter: blur(10px);
                box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
            }

            .hud {
                left: 20px;
                top: 20px;
                max-width: 360px;
            }

            .hud h1 {
                margin: 0;
                font-size: 18px;
                font-weight: 600;
            }

            .hud p {
                margin: 6px 0 0;
                color: var(--muted);
                font-size: 12px;
                line-height: 1.5;
            }

            .status {
                right: 20px;
                bottom: 20px;
                color: var(--muted);
                font-size: 12px;
            }

            @media (max-width: 720px) {
                .hud,
                .status {
                    left: 12px;
                    right: 12px;
                }

                .hud { top: 12px; }
                .status { bottom: 12px; }
            }
        </style>
    </head>
    <body>
        <canvas id="viewer"></canvas>
        <div class="hud">
            <h1>东汉铜车马</h1>
            <p>Standalone Mview fidelity viewer. Pure IBL, extracted Mview textures, and direct scene camera/background matching.</p>
        </div>
        <div id="status" class="status">Booting fidelity viewer...</div>
        <script type="module" src="./mview-fidelity.js"></script>
    </body>
</html>
