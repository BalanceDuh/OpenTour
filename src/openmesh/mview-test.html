<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mview Test</title>
        <link rel="icon" href="data:," />
        <style>
            :root {
                color-scheme: dark;
                --bg: #1a1d21;
                --panel: rgba(10, 12, 15, 0.66);
                --line: rgba(255, 255, 255, 0.12);
                --text: #eef2f6;
                --muted: #b9c2cc;
            }

            * { box-sizing: border-box; }

            html, body {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background:
                    radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 30%),
                    linear-gradient(180deg, #2b2f35 0%, #15181c 100%);
                color: var(--text);
                font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
            }

            #app {
                position: relative;
                width: 100%;
                height: 100%;
            }

            #viewer {
                position: absolute;
                inset: 0;
            }

            .hud {
                position: absolute;
                left: 20px;
                top: 20px;
                z-index: 10;
                padding: 12px 14px;
                border: 1px solid var(--line);
                border-radius: 14px;
                background: var(--panel);
                backdrop-filter: blur(10px);
                pointer-events: none;
                box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24);
            }

            .hud h1 {
                margin: 0;
                font-size: 18px;
                font-weight: 600;
            }

            .hud p {
                margin: 6px 0 0;
                color: var(--muted);
                font-size: 12px;
                line-height: 1.5;
            }

            .status {
                position: absolute;
                right: 20px;
                bottom: 20px;
                z-index: 10;
                padding: 10px 12px;
                border-radius: 12px;
                border: 1px solid var(--line);
                background: var(--panel);
                color: var(--muted);
                font-size: 12px;
                backdrop-filter: blur(10px);
                box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24);
            }

            @media (max-width: 640px) {
                .hud {
                    left: 12px;
                    top: 12px;
                    right: 12px;
                }

                .status {
                    left: 12px;
                    right: 12px;
                    bottom: 12px;
                }
            }
        </style>
        <script src="/vendor/marmoset.js"></script>
    </head>
    <body>
        <div id="app">
            <div id="viewer"></div>
            <div class="hud">
                <h1>东汉铜车马</h1>
                <p>直接加载 `B.1.13119.mview`，用于快速查看 Marmoset Viewer 渲染效果。</p>
            </div>
            <div class="status">加载较大，首次打开可能需要等待数秒。</div>
        </div>
        <script>
            marmoset.embed('/workspace-resource/B.1.13119%20%E4%B8%9C%E6%B1%89%E9%93%9C%E8%BD%A6%E9%A9%AC%202/B.1.13119.mview', {
                autoStart: true,
                fullFrame: true
            });
        </script>
    </body>
</html>
